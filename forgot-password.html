<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Crustora Bakery</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,800;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <a href="signin.html" style="position: absolute; top: 2rem; left: 2rem; text-decoration: none; color: var(--accent-dark); font-weight: 600; display: flex; align-items: center; gap: 0.5rem; z-index: 10;">
        ← Back to Sign In
    </a>

    <main class="auth-card">
        <a href="index.html" class="logo" style="margin-bottom: 2rem;"><img src="assets/images/logo.png" alt="Crustora Logo"></a>
        <h2>Reset Password</h2>
        <p>Enter your registered mobile number below and we'll send you an SMS to reset your password.</p>

        <form class="auth-form" onsubmit="event.preventDefault(); alert('Reset link sent to your mobile safely!'); window.location.href='signin.html';">
            <div>
                <label for="phone">Mobile Number</label>
                <div class="phone-input-group">
                    <select class="country-code-select" id="countryCode">
                        <option value="+1">+1 (US/CA)</option>
                        <option value="+44">+44 (UK)</option>
                        <option value="+91" selected>+91 (IN)</option>
                        <option value="+61">+61 (AU)</option>
                        <option value="+81">+81 (JP)</option>
                        <option value="+49">+49 (DE)</option>
                        <option value="+33">+33 (FR)</option>
                        <option value="+39">+39 (IT)</option>
                        <option value="+55">+55 (BR)</option>
                        <option value="+86">+86 (CN)</option>
                        <option value="+971">+971 (AE)</option>
                    </select>
                    <input type="tel" id="phone" placeholder="Mobile Number" required>
                </div>
                <p id="availabilityMsg" style="display: none; color: var(--accent-dark); font-size: 0.85rem; margin-top: 0.4rem; font-weight: 500;">Service not available.</p>
            </div>
            <button type="submit" class="btn primary">Send Reset Link</button>
        </form>

        <div class="auth-footer">
            Remember your password? <a href="signin.html">Sign In</a>
        </div>
    </main>

    <script>
        const countryCodeSelect = document.getElementById('countryCode');
        const availabilityMsg = document.getElementById('availabilityMsg');
        const submitBtn = document.querySelector('.auth-form button[type="submit"]');

        countryCodeSelect.addEventListener('change', (e) => {
            if (e.target.value !== '+91') {
                availabilityMsg.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
            } else {
                availabilityMsg.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
            }
        });
    </script>
</body>
</html>
